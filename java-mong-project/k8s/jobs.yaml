apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-replica-set-init
  namespace: project-a
spec:
    template:
      spec:
        restartPolicy: OnFailure
        containers:
        - name: init
          image: 017341176608.dkr.ecr.us-east-1.amazonaws.com/mongo:latest
          command:
          - bash
          - "-c"
          - |
              sleep 15
    
              mongosh --host mongo-0.mongo:27017 <<EOF
              rs.initiate({
              _id: "rs0",
              members: [
                    { _id: 0, host: "mongo-0.mongo:27017" },
                    { _id: 1, host: "mongo-1.mongo:27017" }
              ]
              })
              EOF